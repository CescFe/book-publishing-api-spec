name: Create and Push Spec Tag

on:
  workflow_dispatch:
    inputs:
      spec:
        description: "Spec module under /spec (e.g., ms-catalog)"
        required: true
        default: "ms-catalog"
      version:
        description: "Release version (e.g., v1.4.0)"
        required: true
        default: "v1.4.0"

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate inputs
        id: validate
        run: |
          set -euo pipefail

          spec="${{ github.event.inputs.spec }}"
          version="${{ github.event.inputs.version }}"
          spec_path="spec/${spec}/build.gradle.kts"

          if [[ ! "$spec" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
            echo "::error::Invalid spec name '$spec'. Use lowercase letters, numbers, and hyphens only."
            exit 1
          fi

          if [ ! -f "$spec_path" ]; then
            echo "::error::Spec module 'spec/${spec}' does not exist or is missing build.gradle.kts"
            exit 1
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '$version'. Expected format like v1.4.0"
            exit 1
          fi

          tag="spec/${spec}/${version}"
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::error::Tag '${tag}' already exists locally"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag '${tag}' already exists in origin"
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "${{ steps.validate.outputs.tag }}"
          git push origin "${{ steps.validate.outputs.tag }}"
          echo "✅ Tag ${{ steps.validate.outputs.tag }} created and pushed successfully"
