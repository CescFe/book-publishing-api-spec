name: Publish Package to Artifact Registry

on:
  workflow_dispatch:
    inputs:
      spec:
        description: "Spec module under /spec (e.g., ms-catalog)"
        required: true
        default: "ms-catalog"
      version:
        description: "Package version to publish (e.g., 0.1.0)"
        required: true
        default: "1.4.0"

permissions:
  contents: read
  id-token: write

jobs:
  publish-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/867321761184/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: github-actions@book-publishing-backend.iam.gserviceaccount.com

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper

      - name: Validate selected spec module
        run: |
          if [ ! -f "spec/${{ github.event.inputs.spec }}/build.gradle.kts" ]; then
            echo "::error::Spec module 'spec/${{ github.event.inputs.spec }}' does not exist or is missing build.gradle.kts"
            exit 1
          fi

      - name: Generate code
        run: ./gradlew ":spec:${{ github.event.inputs.spec }}:openApiGenerate" -PpackageVersion="${{ github.event.inputs.version }}" --no-daemon --warning-mode all

      - name: Build JAR
        run: ./gradlew ":spec:${{ github.event.inputs.spec }}:build" -PpackageVersion="${{ github.event.inputs.version }}" --no-daemon --warning-mode all

      - name: Publish to Artifact Registry
        run: ./gradlew ":spec:${{ github.event.inputs.spec }}:publish" -PpackageVersion="${{ github.event.inputs.version }}" --no-daemon --warning-mode all

      - name: Verify package publication
        run: |
          artifact_id="book-publishing-${{ github.event.inputs.spec }}-api-spec"
          echo "✅ Package published successfully!"
          echo "Package coordinates: org.cescfe:${artifact_id}:${{ github.event.inputs.version }}"
