name: Publish Package to Artifact Registry

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g., 0.1.0)"
        required: true
        default: "1.4.0"

permissions:
  contents: read
  id-token: write

jobs:
  publish-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/867321761184/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: github-actions@book-publishing-backend.iam.gserviceaccount.com

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper

      - name: Set version property
        run: echo "version=${{ github.event.inputs.version }}" >> gradle.properties

      - name: Generate code
        run: ./gradlew openApiGenerate

      - name: Build JAR
        run: ./gradlew build

      - name: Publish to Artifact Registry
        run: ./gradlew publish

      - name: Verify package publication
        run: |
          echo "✅ Package published successfully!"
          echo "Package coordinates: org.cescfe:book-publishing-api-spec:${{ github.event.inputs.version }}"
