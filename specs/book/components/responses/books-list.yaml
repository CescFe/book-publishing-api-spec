description: List of books retrieved successfully
content:
  application/json:
    schema:
      oneOf:
        - allOf:
            - $ref: '../../../shared/components/schemas/paginated-response.yaml#/PaginatedResponse'
            - type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../schemas/book-summary.yaml'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '../schemas/book-summary.yaml'
            meta:
              type: object
              properties:
                total:
                  type: integer
                  description: Total number of items
              required:
                - total
          required:
            - data
            - meta
