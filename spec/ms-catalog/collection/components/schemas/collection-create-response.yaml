CreateCollectionResponse:
  type: object
  description: Collection details after creation
  required:
    - name
  properties:
    id:
      $ref: '../../../shared/components/schemas/id.yaml#/Id'
    name:
      type: string
      description: Collection name
      minLength: 1
      maxLength: 80
      example: "Fantasy Classics"
    reading_level:
      $ref: '../../../shared/components/schemas/enums/reading-level.yaml#/ReadingLevel'
      example: "ADULT"
    primary_language:
      $ref: '../../../shared/components/schemas/enums/language.yaml#/Language'
      example: "ENGLISH"
    secondary_languages:
      type: array
      items:
        $ref: '../../../shared/components/schemas/enums/language.yaml#/Language'
      maxItems: 3
      description: Secondary languages associated with the collection
      example: ["CATALAN", "SPANISH"]
    primary_genre:
      $ref: '../../../shared/components/schemas/enums/genre.yaml#/Genre'
      example: "FANTASY"
    secondary_genres:
      type: array
      items:
        $ref: '../../../shared/components/schemas/enums/genre.yaml#/Genre'
      maxItems: 3
      description: Secondary genres associated with the collection
      example: ["ADVENTURE", "HISTORICAL_FICTION"]
    created_at:
      $ref: '../../../shared/components/schemas/created-at.yaml#/CreatedAt'
    created_by:
      $ref: '../../../shared/components/schemas/created-by.yaml#/CreatedBy'
    updated_at:
      $ref: '../../../shared/components/schemas/updated-at.yaml#/UpdatedAt'
    updated_by:
      $ref: '../../../shared/components/schemas/updated-by.yaml#/UpdatedBy'
