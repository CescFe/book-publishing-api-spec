openapi: 3.1.2
info:
  title: Book Publishing API MicroService Catalog
  version: 1.5.0
  description: |-
    Internal API for managing books, authors, and collections in a publishing system.
    This API provides CRUD operations for books, collections and authors secured with jwt.
  contact:
    name: FrancescFe
    url: https://github.com/FrancescFe
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: local server

paths:
  /api/v1/auth/login:
    post:
      tags:
        - Login
      operationId: login
      summary: Login user
      description: Create an access token for the authenticated user
      security:
        - bearerAuth: [ ]
      requestBody:
        $ref: './auth/components/requests/login-request.yaml'
      responses:
        '200':
          $ref: './auth/components/responses/login-response.yaml'
        '401':
          $ref: './shared/components/responses/errors/unauthorized.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'

  /api/v1/authors:
    get:
      tags:
        - ListAuthorsPaginated
      operationId: listAuthorsPaginated
      summary: List authors paginated
      description: Retrieve a list of authors with pagination
      parameters:
        - $ref: './shared/components/parameters/pagination.yaml#/limit'
        - $ref: './shared/components/parameters/pagination.yaml#/page'
      responses:
        '200':
          $ref: './author/components/responses/authors-list-paginated.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
    post:
      tags:
        - CreateAuthor
      operationId: createAuthor
      summary: Create a new author
      description: Create a new author with the provided information
      requestBody:
        description: Author creation request body
        required: true
        content:
          application/json:
            schema:
              $ref: './author/components/schemas/author-create-request.yaml#/CreateAuthorRequest'
      responses:
        '201':
          $ref: './author/components/responses/author-created.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '409':
          $ref: './shared/components/responses/errors/conflict.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
  /api/v1/authors/all:
    get:
      tags:
        - ListAllAuthors
      operationId: listAllAuthors
      summary: Get all authors
      description: Retrieve a list of all authors without pagination
      responses:
        '200':
          $ref: './author/components/responses/authors-list-non-paginated.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
  /api/v1/authors/{id}:
    get:
      tags:
        - GetAuthorById
      operationId: getAuthorByID
      summary: Get author by ID
      description: Retrieve a single author by their unique identifier
      parameters:
        - $ref: './shared/components/parameters/uuid-path.yaml'
      responses:
        '200':
          $ref: './author/components/responses/author-retrieved.yaml'
        '404':
          $ref: './shared/components/responses/errors/not-found.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
    put:
      tags:
        - UpdateAuthorById
      operationId: updateAuthor
      summary: Update an author
      description: Update an existing author by their unique identifier
      parameters:
        - $ref: './shared/components/parameters/uuid-path.yaml'
      requestBody:
        description: Author updated request body
        required: true
        content:
          application/json:
            schema:
              $ref: './author/components/schemas/author-update-request.yaml#/UpdateAuthorRequest'
      responses:
        '200':
          $ref: './author/components/responses/author-updated.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '404':
          $ref: './shared/components/responses/errors/not-found.yaml'
        '409':
          $ref: './shared/components/responses/errors/conflict.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
    delete:
      tags:
        - DeleteAuthorById
      operationId: deleteAuthor
      summary: Delete an author
      description: Delete an existing author by their unique identifier
      parameters:
        - $ref: './shared/components/parameters/uuid-path.yaml'
      responses:
        '204':
          description: Author deleted successfully
        '404':
          $ref: './shared/components/responses/errors/not-found.yaml'
        '409':
          $ref: './shared/components/responses/errors/conflict.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'

  /api/v1/books:
    get:
      tags:
        - ListBooksPaginated
      operationId: listBooksPaginated
      summary: List books paginated
      description: Retrieve a list of books with pagination
      parameters:
        - $ref: './shared/components/parameters/pagination.yaml#/limit'
        - $ref: './shared/components/parameters/pagination.yaml#/page'
      responses:
        '200':
          $ref: './book/components/responses/books-list-paginated.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
    post:
      tags:
        - CreateBook
      operationId: createBook
      summary: Create a new book
      description: Create a new book with the provided information
      requestBody:
        description: Book creation request body
        required: true
        content:
          application/json:
            schema:
              $ref: './book/components/schemas/book-create-request.yaml#/CreateBookRequest'
      responses:
        '201':
          $ref: './book/components/responses/book-created.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '409':
          $ref: './shared/components/responses/errors/conflict.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
  /api/v1/books/all:
    get:
      tags:
        - ListAllBooks
      operationId: listAllBooks
      summary: List all books
      description: Retrieve a list of all books without pagination
      responses:
        '200':
          $ref: './book/components/responses/books-list-non-paginated.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
  /api/v1/books/{id}:
    get:
      tags:
        - GetBookById
      operationId: getBookByID
      summary: Get book by ID
      description: Retrieve a single book by their unique identifier
      parameters:
        - $ref: './shared/components/parameters/uuid-path.yaml'
      responses:
        '200':
          $ref: './book/components/responses/book-retrieved.yaml'
        '404':
          $ref: './shared/components/responses/errors/not-found.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
    put:
      tags:
        - UpdateBookById
      operationId: updateBook
      summary: Update a book
      description: Update an existing book by their unique identifier
      parameters:
        - $ref: './shared/components/parameters/uuid-path.yaml'
      requestBody:
        description: Book updated request body
        required: true
        content:
          application/json:
            schema:
              $ref: './book/components/schemas/book-update-request.yaml#/UpdateBookRequest'
      responses:
        '200':
          $ref: './book/components/responses/book-updated.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '404':
          $ref: './shared/components/responses/errors/not-found.yaml'
        '409':
          $ref: './shared/components/responses/errors/conflict.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
    delete:
      tags:
        - DeleteBookById
      operationId: deleteBook
      summary: Delete an book
      description: Delete an existing book by their unique identifier
      parameters:
        - $ref: './shared/components/parameters/uuid-path.yaml'
      responses:
        '204':
          description: Book deleted successfully
        '404':
          $ref: './shared/components/responses/errors/not-found.yaml'
        '409':
          $ref: './shared/components/responses/errors/conflict.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'

  /api/v1/collections:
    get:
      tags:
        - ListCollectionsPaginated
      operationId: listCollectionsPaginated
      summary: List collections paginated
      description: Retrieve a list of collections with pagination
      parameters:
        - $ref: './shared/components/parameters/pagination.yaml#/limit'
        - $ref: './shared/components/parameters/pagination.yaml#/page'
      responses:
        '200':
          $ref: './collection/components/responses/collections-list-paginated.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
    post:
      tags:
        - CreateCollection
      operationId: createCollection
      summary: Create a new collection
      description: Create a new collection with the provided information
      requestBody:
        description: Collection creation request body
        required: true
        content:
          application/json:
            schema:
              $ref: './collection/components/schemas/collection-create-request.yaml#/CreateCollectionRequest'
      responses:
        '201':
          $ref: './collection/components/responses/collection-created.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '409':
          $ref: './shared/components/responses/errors/conflict.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
  /api/v1/collections/all:
    get:
      tags:
        - ListAllCollections
      operationId: listAllCollections
      summary: List all collections
      description: Retrieve a list of all collections without pagination
      responses:
        '200':
          $ref: './collection/components/responses/collections-list-non-paginated.yaml'
        '400':
          $ref: './shared/components/responses/errors/bad-request.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
  /api/v1/collections/{id}:
    get:
      tags:
        - GetCollectionById
      operationId: getCollectionByID
      summary: Get collection by ID
      description: Retrieve a single collection by their unique identifier
      parameters:
        - $ref: './shared/components/parameters/uuid-path.yaml'
      responses:
        '200':
          $ref: './collection/components/responses/collection-retrieved.yaml'
        '404':
          $ref: './shared/components/responses/errors/not-found.yaml'
        '500':
          $ref: './shared/components/responses/errors/internal-error.yaml'
    put:
      tags:
        - UpdateCollectionById
      operationId: updateCollection
      summary: Update a collection
      description: Update an existing collection by their unique identifier
      parameters:
